<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login SIT Burundi</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <header class="navbar">
    <div class="container navbar-inner">
      <a class="brand" href="index.html">
        <div class="brand-badge"></div>
        <div>SIT <span>Burundi</span></div>
      </a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="siteNav">☰ Menu</button>
      <nav class="nav-links" id="siteNav">
        <a href="index.html">Home</a>
        <a href="tourism.html">Tourism</a>
        <a href="infrastructure.html">Infrastructure</a>
        <a href="investment.html">Investment</a>
        <a href="community.html">Community</a>
        <a href="admin.html" data-admin-link>Admin</a>
      </nav>
      <div class="nav-auth" id="authArea"></div>
    </div>
  </header>

  <section class="section">
    <div class="container">
      <div class="auth-centered">
        <div class="auth-card">
          <div class="section-header" style="text-align: center; margin-bottom: 24px;">
            <h2 style="margin-bottom: 8px;">Welcome Back</h2>
            <p>Sign in to your SIT Burundi account</p>
          </div>
          <form id="loginForm" class="form-grid">
            <div style="margin-bottom: 16px;">
              <label class="label">Email Address</label>
              <input id="loginEmail" class="input" type="email" required placeholder="name@example.com" />
            </div>
            <div style="margin-bottom: 24px;">
              <label class="label">Password</label>
              <input id="loginPassword" class="input" type="password" required placeholder="••••••••" />
            </div>
            <button class="btn btn-primary w-full" type="submit" style="width: 100%;">Login</button>
          </form>
          <div id="loginNote" class="notice" style="margin-top: 24px; text-align: center;">
            Admin test: <strong>admin@sitburundi.com</strong> / <strong>Admin123!</strong>
          </div>
          <p style="text-align: center; margin-top: 24px; font-size: 14px; color: var(--slate-600);">
            Don't have an account? <a href="register.html" style="color: var(--primary); font-weight: 600;">Create one</a>
          </p>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container footer-inner">© 2026 SIT Burundi</div>
  </footer>
  <script src="js/script.js" defer></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/data.js"></script>
</body>

</html>

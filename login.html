<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login | SIT Burundi</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <!-- Navigation -->
  <header class="navbar">
    <div class="container navbar-inner">
      <a class="brand" href="index.html">
        <div class="brand-badge">
          <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 2L2 22h20L12 2z" />
          </svg>
        </div>
        <span>SIT Burundi</span>
      </a>

      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="siteNav">
        <span class="nav-toggle-icon">☰</span>
      </button>

      <nav class="nav-links" id="siteNav">
        <a href="index.html">Home</a>
        <a href="tourism.html">Tourism</a>
        <a href="infrastructure.html">Infrastructure</a>
        <a href="investment.html">Investment</a>
        <a href="community.html">Community</a>
        <a href="admin.html" data-admin-link style="display: none;">Admin</a>
      </nav>

      <div class="nav-auth" id="authArea">
        <a class="nav-ghost" href="register.html">Sign up</a>
        <a class="nav-cta" href="login.html">Login</a>
      </div>
    </div>
  </header>

  <!-- Login Form -->
  <section class="section">
    <div class="container">
      <div class="auth-centered">
        <div class="auth-card">
          <div class="section-header" style="text-align: center; margin-bottom: 24px;">
            <h2>Welcome Back</h2>
            <p>Sign in to your account</p>
          </div>

          <form id="loginForm" class="form-grid">
            <div>
              <label class="label">Email</label>
              <input id="loginEmail" class="input" type="email" required placeholder="name@example.com" />
            </div>
            <div>
              <label class="label">Password</label>
              <input id="loginPassword" class="input" type="password" required placeholder="••••••••" />
            </div>
            <button class="btn btn-primary w-full" type="submit">Login</button>
          </form>

          <div class="notice" style="margin-top: 20px; text-align: center;">
            Admin: admin@sitburundi.com / Admin123!
          </div>

          <p style="text-align: center; margin-top: 20px; font-size: 14px; color: #64748b;">
            Don't have an account? <a href="register.html" style="color: #0B3A6A; font-weight: 600;">Register</a>
          </p>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container footer-inner">
      © 2026 SIT Burundi
    </div>
  </footer>

  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tourism | SIT Burundi</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- Role Selection Modal -->
  <div id="fitCheckOverlay" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <h2>Who are you?</h2>
      <p>Select your role to see relevant destinations</p>
      <div class="role-grid">
        <button class="role-btn" onclick="setDiscoveryRole('Tourist')">
          <span>🌍</span> I am a Tourist
        </button>
        <button class="role-btn" onclick="setDiscoveryRole('Investor')">
          <span>💼</span> I am an Investor
        </button>
        <button class="role-btn" onclick="setDiscoveryRole('Community')">
          <span>🤝</span> I am Community
        </button>
      </div>
    </div>
  </div>

  <!-- Navigation -->
  <header class="navbar">
    <div class="container navbar-inner">
      <a class="brand" href="index.html">
        <div class="brand-badge">
          <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 2L2 22h20L12 2z" />
          </svg>
        </div>
        <span>SIT Burundi</span>
      </a>

      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="siteNav">
        <span class="nav-toggle-icon">☰</span>
      </button>

      <nav class="nav-links" id="siteNav">
        <a href="index.html">Home</a>
        <a href="tourism.html" class="active">Tourism</a>
        <a href="infrastructure.html">Infrastructure</a>
        <a href="investment.html">Investment</a>
        <a href="community.html">Community</a>
        <a href="admin.html" data-admin-link style="display: none;">Admin</a>
      </nav>

      <div class="nav-auth" id="authArea">
        <a class="nav-ghost" href="register.html">Sign up</a>
        <a class="nav-cta" href="login.html">Login</a>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <section class="section">
    <div class="container">
      <div class="section-header">
        <h2>Tourism Destinations</h2>
        <p>Explore verified destinations across Burundi</p>
      </div>

      <!-- Search -->
      <div class="search-bar">
        <input type="text" id="searchInput" class="search-input input" placeholder="Search destinations..."
          oninput="handleSearch()">
        <select id="roleFilter" class="select" style="max-width: 160px;" onchange="handleSearch()">
          <option value="">All Categories</option>
          <option value="lake">Lakes</option>
          <option value="park">Parks</option>
          <option value="culture">Culture</option>
          <option value="nature">Nature</option>
        </select>
      </div>

      <!-- Destinations Grid -->
      <div class="grid-3 cards" id="destinations"></div>

      <!-- Feedback Section -->
      <div class="section-header" style="margin-top: 48px;">
        <h2>Feedback & Reporting</h2>
        <p>Report issues or suggest new destinations</p>
      </div>
      <div id="feedbackBox"></div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container footer-inner">
      © 2026 SIT Burundi
    </div>
  </footer>

  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/script.js" defer></script>
</body>

</html>

<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Register SIT Burundi</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <header class="navbar">
    <div class="container navbar-inner">
      <a class="brand" href="index.html">
        <div class="brand-badge"></div>
        <div>SIT <span>Burundi</span></div>
      </a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="siteNav">☰ Menu</button>
      <nav class="nav-links" id="siteNav">
        <a href="index.html">Home</a>
        <a href="tourism.html">Tourism</a>
        <a href="infrastructure.html">Infrastructure</a>
        <a href="investment.html">Investment</a>
        <a href="community.html">Community</a>
        <a href="admin.html" data-admin-link>Admin</a>
      </nav>
      <div class="nav-auth" id="authArea"></div>
    </div>
  </header>

  <section class="section">
    <div class="container">
      <div class="auth-centered">
        <div class="auth-card">
          <div class="section-header" style="text-align: center; margin-bottom: 24px;">
            <h2 style="margin-bottom: 8px;">Create Account</h2>
            <p>Join the SIT Burundi community</p>
          </div>
          <form id="registerForm" class="form-grid">
            <div style="margin-bottom: 16px;">
              <label class="label">Full Name</label>
              <input id="regName" class="input" type="text" required placeholder="Enter your name" />
            </div>
            <div style="margin-bottom: 16px;">
              <label class="label">Email Address</label>
              <input id="regEmail" class="input" type="email" required placeholder="name@example.com" />
            </div>
            <div style="margin-bottom: 16px;">
              <label class="label">Password</label>
              <input id="regPassword" class="input" type="password" required placeholder="Min 6 characters" />
            </div>
            <div style="margin-bottom: 24px;">
              <label class="label">Choose Your Role</label>
              <select id="regRole" class="select" required>
                <option value="">Select a role</option>
                <option value="Tourist">Tourist</option>
                <option value="Investor">Investor</option>
                <option value="Community">Community Member</option>
              </select>
            </div>
            <button class="btn btn-primary w-full" type="submit" style="width: 100%;">Create Account</button>
          </form>
          <div id="registerNote" class="notice" style="margin-top: 24px; text-align: center;">Automatically logs you in after creation.</div>
          <p style="text-align: center; margin-top: 24px; font-size: 14px; color: var(--slate-600);">
            Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 600;">Sign in</a>
          </p>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container footer-inner">© 2026 SIT Burundi</div>
  </footer>

  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/data.js"></script>
</body>

</html>

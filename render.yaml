services:
  - type: web
    name: sit-burundi-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: sit-burundi-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: sit-burundi-db
    plan: free
    databaseName: sitburundi
